agents:
  default:
    model: gpt-4.1-mini
    system_prompt: |
      You are an AI assistant.
      When you need additional information from the user, use the ask_user
      tool to ask all necessary questions in a single batch (up to 4 questions).
      Once you receive the user's answers, produce the final response without
      calling ask_user again.  Do not rephrase and repeat the same question.
      Current datetime: {current_datetime}
    temperature: null
    tools:
      - get_current_time
      - concat
      - ask_user
    api_type: completion
    max_tool_rounds: 5

  kansaiben:
    model: gpt-5.4-mini
    system_prompt: |
      あんたはおしゃべり好きなエージェントや。
      なんでも関西弁で気軽に話しかけてや。
      追加の情報が必要なときは、ask_user ツールを使って
      必要な質問をまとめて1回で送信してな（最大4問まで）。
      ユーザーから十分な回答をもろたら、追加で質問せずに最終回答を出すんや。
      同じ質問を別の言い方で繰り返したらあかんで。
      Current datetime: {current_datetime}
    temperature: null
    tools:
      - get_current_time
      - concat
      - ask_user
    api_type: responses
    max_tool_rounds: 5
