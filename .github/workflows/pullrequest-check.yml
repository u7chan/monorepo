# Pull Request Check on Project Changes
name: CI

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-pr-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  pull-request-check-if-changes-detected:
    # Docker commands require ubuntu-latest, ubuntu-slim is not available
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          persist-credentials: false
          # PRのベースブランチとの差分取得に必要な履歴深度
          # 50コミットあれば通常のPRの変更はカバーできる
          fetch-depth: 50

      - name: Fetch base branch for comparison
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          auth_header="$(printf 'x-access-token:%s' "$GITHUB_TOKEN" | base64 -w0)"
          git -c "http.https://github.com/.extraheader=AUTHORIZATION: basic $auth_header" \
            fetch origin ${{ github.base_ref }}:refs/remotes/origin/${{ github.base_ref }}

      - name: Get Changed Directories
        uses: ./.github/actions/get-changed-directories

      - name: Get License Check Targets
        uses: ./.github/actions/get-license-check-targets

      - name: Set up Bun for License Check
        if: env.LICENSE_CHECK_TARGETS != ''
        uses: oven-sh/setup-bun@v2

      - name: Set up uv for License Check
        if: env.LICENSE_CHECK_TARGETS != ''
        uses: astral-sh/setup-uv@v6

      - name: Validate License Check
        if: env.LICENSE_CHECK_VALIDATION_REQUIRED == 'true'
        run: |
          ./scripts/check-licenses --validate-policy
          python -m unittest discover scripts/tests -p 'test_check_licenses.py'

      - name: Check OSS Licenses
        if: env.LICENSE_CHECK_TARGETS != ''
        run: |
          ./scripts/check-licenses --changed-targets-file license_check_targets.txt

      - name: Get Changed Projects
        uses: ./.github/actions/get-changed-projects

      - name: Build Docker Images
        if: env.BUILD_PROJECT != ''
        uses: ./.github/actions/build-docker-images
        with:
          stage: test

      - name: Show Docker Images
        if: env.BUILD_PROJECT != ''
        run: |
          docker images
