# Docker Build on Project Changes
name: CD

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref (branch/tag/SHA)"
        required: true
      projects:
        description: "Comma separated project directories"
        required: true

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.event_name == 'workflow_dispatch' && github.run_id || github.ref }}
  cancel-in-progress: ${{ github.event_name != 'workflow_dispatch' }}

jobs:
  docker-build-if-changes-detected:
    # Dockerコマンドを使用するため、ubuntu-slimでは利用できない
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}
          # プッシュイベントでは直前のコミットとの差分で十分
          # 2コミット分の履歴で変更検出が可能
          fetch-depth: 2

      - name: Get Changed Directories
        if: github.event_name == 'push'
        uses: ./.github/actions/get-changed-directories

      - name: Get Changed Projects
        if: github.event_name == 'push'
        uses: ./.github/actions/get-changed-projects
        with:
          required-stage: final

      - name: Prepare manual build inputs
        if: github.event_name == 'workflow_dispatch'
        uses: ./.github/actions/prepare-manual-build-inputs
        with:
          projects: ${{ github.event.inputs.projects }}

      - name: Set image tag
        id: set-image-tag
        uses: ./.github/actions/set-image-tag
        with:
          event_name: ${{ github.event_name }}
          ref_input: ${{ github.event.inputs.ref }}

      - name: Build Docker Images
        if: env.BUILD_PROJECT != ''
        uses: ./.github/actions/build-docker-images
        with:
          stage: final
          image_tag: ${{ steps.set-image-tag.outputs.image_tag }}

      - name: Show Docker Images
        if: env.BUILD_PROJECT != ''
        run: |
          docker images

      - name: Push Docker Images
        if: env.BUILD_PROJECT != ''
        id: push_images
        uses: ./.github/actions/push-docker-images
        with:
          username: ${{ github.actor }}
          password: ${{ secrets.PRIVATE_REPO_TOKEN }}
          image_tag: ${{ steps.set-image-tag.outputs.image_tag }}

      - name: Show manual deploy inputs
        if: github.event_name == 'workflow_dispatch' && steps.push_images.outputs.project_names_csv != ''
        env:
          PROJECT_NAMES_CSV: ${{ steps.push_images.outputs.project_names_csv }}
          IMAGE_TAG: ${{ steps.set-image-tag.outputs.image_tag }}
        run: |
          echo "Manual build handoff"
          echo "image_tag=$IMAGE_TAG"
          echo ""
          IFS=',' read -ra PROJECT_NAMES <<< "$PROJECT_NAMES_CSV"
          for project_name in "${PROJECT_NAMES[@]}"; do
            echo "target=$project_name image_tag=$IMAGE_TAG"
          done

      - name: Clean Up Docker Images
        if: steps.push_images.outputs.project_names_csv != ''
        uses: ./.github/actions/cleanup-docker-images
        with:
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          repo-name: ${{ secrets.PRIVATE_REPO_NAME }}
          project-names-csv: ${{ steps.push_images.outputs.project_names_csv }}
          keep-count: "3"
          cleanup-mode: ${{ github.event_name == 'workflow_dispatch' && 'manual' || 'normal' }}
