version: 2
updates:
  - package-ecosystem: "bun"
    directories:
      - "/projects/portfolio"
      - "/projects/file-server"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 2
    rebase-strategy: "disabled"
    groups:
      bun-non-major:
        applies-to: version-updates
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "uv"
    directories:
      - "/projects/edit-vid"
      - "/projects/simple-agent-poc"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 2
    rebase-strategy: "disabled"
    groups:
      uv-non-major:
        applies-to: version-updates
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
